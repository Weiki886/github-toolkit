<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Issue Downloader</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
  .card { background: #fff; border-radius: 12px; padding: 32px; width: 620px; box-shadow: 0 2px 16px rgba(0,0,0,.08); }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: #666; font-size: 13px; margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
  input, .btn { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  input:focus { outline: none; border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,.15); }
  .btn { background: #0969da; color: #fff; border: none; cursor: pointer; font-weight: 600; margin-top: 4px; }
  .btn:hover { background: #0860c0; }
  .btn:disabled { background: #94b8e0; cursor: not-allowed; }
  .btn.sm { width: auto; padding: 6px 16px; font-size: 13px; }
  .btn.green { background: #1a7f37; }
  .btn.green:hover { background: #156a2d; }
  .hint { font-size: 11px; color: #888; margin-top: 4px; }

  .issue-list { margin-top: 16px; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; display: none; }
  .issue-list.show { display: block; }
  .issue-header { background: #f6f8fa; padding: 10px 14px; display: flex; align-items: flex-start; gap: 10px; border-bottom: 1px solid #e0e0e0; flex-wrap: nowrap; }
  .issue-header label { margin-bottom: 0; font-size: 13px; cursor: pointer; }
  .issue-header .count { color: #666; font-size: 12px; margin-left: auto; }
  .issue-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
  .issue-item:hover { background: #fafbfc; }
  .issue-item:last-child { border-bottom: none; }
  .issue-header input[type=checkbox] { width: auto; margin: 3px 0 0 0; flex-shrink: 0; }
  .issue-item input[type=checkbox] { width: auto; margin-top: 3px; }
  .issue-num { color: #666; font-size: 12px; min-width: 42px; }
  .issue-title { font-size: 14px; flex: 1; }
  .issue-state { font-size: 11px; padding: 2px 8px; border-radius: 12px; }
  .issue-state.open { background: #dafbe1; color: #1a7f37; }
  .issue-state.closed { background: #f0f0f0; color: #666; }
  .toolbar { display: flex; gap: 8px; margin-top: 12px; display: none; }
  .toolbar.show { display: flex; }
  .log { margin-top: 16px; padding: 12px; background: #f6f8fa; border-radius: 8px; font-size: 13px; max-height: 160px; overflow-y: auto; white-space: pre-wrap; display: none; }
  .log.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <h1>Issue Downloader</h1>
  <p class="sub">从 GitHub 仓库拉取 Issue 列表，选择想要下载的 Issue</p>

  <div class="field">
    <label>GitHub 仓库地址</label>
    <input id="repo" placeholder="https://github.com/owner/repo">
  </div>

  <div class="field">
    <label>Personal Access Token</label>
    <input id="token" type="password" placeholder="ghp_xxxxxxxxxxxx">
    <div class="hint">Settings → Developer settings → Tokens (classic) → 勾选 repo</div>
  </div>

  <div class="field">
    <label>保存到</label>
    <input id="outdir" placeholder="./issues">
  </div>

  <button class="btn" id="btnFetch" onclick="fetchList()">拉取 Issue 列表</button>

  <div id="issueList" class="issue-list"></div>

  <div id="toolbar" class="toolbar">
    <button class="btn sm green" onclick="download(false)">下载选中</button>
    <button class="btn sm" onclick="download(true)">下载全部</button>
  </div>

  <div id="log" class="log"></div>
</div>

<script>
let issues = []

// 页面加载时自动读取 config.json
fetch('/api/config')
  .then(r => r.json())
  .then(cfg => {
    if (cfg.repo_url && cfg.repo_url !== 'https://github.com/owner/repo') document.getElementById('repo').value = cfg.repo_url
    if (cfg.token) document.getElementById('token').value = cfg.token
    if (cfg.out_dir) document.getElementById('outdir').value = cfg.out_dir
  }).catch(() => {})

async function fetchList() {
  const repo = document.getElementById('repo').value.trim()
  const token = document.getElementById('token').value.trim()
  if (!repo || !token) { showLog('请填写仓库地址和 Token'); return }

  const btn = document.getElementById('btnFetch')
  btn.disabled = true; btn.textContent = '拉取中...'
  showLog('正在获取 Issue 列表...', '')

  try {
    const res = await fetch('/api/list', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ repo_url: repo, token: token })
    })
    const data = await res.json()
    if (data.error) { showLog(data.error); return }

    issues = data.issues || []
    renderList()
    if (issues.length === 0) {
      showLog('该仓库没有 Issue')
    } else {
      showLog('共 ' + issues.length + ' 个 Issue，请选择后下载')
    }
  } catch (e) {
    showLog('请求失败：' + e.message)
  } finally {
    btn.disabled = false; btn.textContent = '拉取 Issue 列表'
  }
}

function renderList() {
  const el = document.getElementById('issueList')
  const tb = document.getElementById('toolbar')

  let html = '<div class="issue-header">'
  html += '<input type="checkbox" id="selectAll" onchange="toggleAll(this)" checked>'
  html += '<span class="count">共 ' + issues.length + ' 个</span>'
  html += '</div>'

  issues.forEach(iss => {
    const labels = (iss.labels || []).map(l => '<span style="background:#e0e0e0;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px">' + l + '</span>').join('')
    html += '<div class="issue-item" onclick="toggleCheck(this)">'
    html += '<input type="checkbox" checked data-num="' + iss.number + '" onclick="event.stopPropagation()">'
    html += '<span class="issue-num">#' + iss.number + '</span>'
    html += '<span class="issue-title">' + iss.title + labels + '</span>'
    html += '<span class="issue-state ' + iss.state + '">' + (iss.state === 'open' ? '进行中' : '已关闭') + '</span>'
    html += '</div>'
  })

  el.innerHTML = html
  el.className = 'issue-list show'
  tb.className = 'toolbar show'
}

function toggleAll(cb) {
  document.querySelectorAll('#issueList input[data-num]').forEach(chk => chk.checked = cb.checked)
}

function toggleCheck(row) {
  const cb = row.querySelector('input[data-num]')
  cb.checked = !cb.checked
}

async function download(all) {
  const repo = document.getElementById('repo').value.trim()
  const token = document.getElementById('token').value.trim()
  const outdir = document.getElementById('outdir').value.trim() || './issues'

  const selected = []
  if (!all) {
    document.querySelectorAll('#issueList input[data-num]:checked').forEach(chk => {
      selected.push(parseInt(chk.dataset.num))
    })
    if (selected.length === 0) { showLog('请至少选择一个 Issue'); return }
  }

  showLog('下载中...')

  try {
    const res = await fetch('/api/fetch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        repo_url: repo, token: token, out_dir: outdir,
        issue_numbers: all ? [] : selected
      })
    })
    const data = await res.json()
    if (data.error) {
      showLog(data.error)
    } else {
      showLog('下载完成！' + data.count + ' 个 Issue 已保存到 ' + data.outDir)
    }
  } catch (e) {
    showLog('请求失败：' + e.message)
  }
}

function showLog(msg) {
  const log = document.getElementById('log')
  log.textContent = msg
  log.className = 'log show'
}
</script>
</body>
</html>
